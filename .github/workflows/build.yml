name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit fix
        run: npm audit fix --audit-level=critical || true

      - name: Create environment.ts
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Inject Mapbox token
        run: |
          sed -i "s/mapboxToken: ''/mapboxToken: '${{ secrets.MAPBOX_TOKEN }}'/" \
            src/environments/environment.prod.ts

      - name: Build
        run: npm run build -- --configuration=production

      - name: Capacitor sync
        run: npx cap sync

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: www
          path: www/
