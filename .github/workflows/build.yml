name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit fix
        run: npm audit fix --audit-level=critical || true

      - name: Create environment.ts
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Inject Mapbox token
        run: |
          sed -i "s/mapboxToken: ''/mapboxToken: '${{ secrets.MAPBOX_TOKEN }}'/" \
            src/environments/environment.prod.ts

      - name: Build
        run: npm run build -- --configuration=production --base-href=/TravelMap/

      - name: Capacitor sync
        run: npx cap sync

      - name: Fix SPA routing for GitHub Pages
        run: cp www/browser/index.html www/browser/404.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: www
          path: www/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
