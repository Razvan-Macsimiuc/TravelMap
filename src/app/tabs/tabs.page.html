<ion-tabs>
  <ion-tab-bar slot="bottom" class="apple-tab-bar">
    <ion-tab-button tab="map" class="apple-tab-button">
      <ion-icon aria-hidden="true" name="globe-outline"></ion-icon>
      <ion-label>Map</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="stats" class="apple-tab-button">
      <ion-icon aria-hidden="true" name="checkmark-circle-outline"></ion-icon>
      <ion-label>Visited</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="settings" class="apple-tab-button">
      <ion-icon aria-hidden="true" name="cog-outline"></ion-icon>
      <ion-label>Settings</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
